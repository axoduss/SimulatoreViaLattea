<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulatore Sistema Solare 3D</title>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600;800&display=swap" rel="stylesheet">
	<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
	<link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="canvas-container"></div>
	<div id="search-container">
		<div class="search-box">
			<svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
				<circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/>
			</svg>
			<input type="text" id="search-input" placeholder="Cerca o fai una domanda..." autocomplete="off">
			<span class="search-shortcut">/</span>
		</div>
		<div id="search-suggestions"></div>
		<div id="search-status"></div>
	</div>
	<div id="date-display">
		<div class="date-main" id="sim-date">—</div>
		<div class="date-sub" id="sim-date-sub">—</div>
	</div>

	<div id="tracking-indicator">
		<div class="tracking-dot"></div>
		<span id="tracking-name">—</span>
		<button class="stop-btn" id="stop-tracking">×</button>
	</div>
	
	<div id="target-hud">
		<div class="hud-ring"></div>
		<div class="hud-label" id="hud-label"></div>
	</div>

	<div id="controls">
		<div class="play-btn" id="play-btn">
			<svg viewBox="0 0 24 24" id="play-icon">
				<polygon points="8,5 19,12 8,19"/>
			</svg>
		</div>
		<div class="timeline-track" id="timeline-track">
			<div class="timeline-fill" id="timeline-fill"></div>
		</div>
		<div class="speed-control" id="speed-control"><span>1</span>x</div>
		<div class="audio-btn" id="audio-btn" title="Audio narrazione AI">
			<svg viewBox="0 0 24 24" id="audio-icon">
			  <!-- icona muto di default -->
			  <path d="M4 9v6h4l5 5V4L8 9H4z" fill="currentColor"/>
			  <line x1="17" y1="8" x2="22" y2="13" stroke="currentColor" stroke-width="2"/>
			  <line x1="22" y1="8" x2="17" y2="13" stroke="currentColor" stroke-width="2"/>
			</svg>
		</div>
	</div>

	<div id="info-panel">
		<div class="info-card-inner">
			<div class="info-card-header">
				<div class="info-card-dot"></div>
				<div class="info-card-name" id="info-name">—</div>
			</div>
			<div class="info-card-type" id="info-type">—</div>
			<div class="info-card-divider"></div>
			<div class="info-card-data">
				<div class="info-data-row">
					<span class="info-data-label">Distanza</span>
					<span class="info-data-value" id="info-distance">—</span>
				</div>
				<div class="info-data-row">
					<span class="info-data-label">Raggio</span>
					<span class="info-data-value" id="info-radius">—</span>
				</div>
				<div class="info-data-row">
					<span class="info-data-label">Periodo</span>
					<span class="info-data-value" id="info-period">—</span>
				</div>
				<div class="info-data-row">
					<span class="info-data-label">Velocità</span>
					<span class="info-data-value" id="info-speed">—</span>
				</div>
			</div>
		</div>
	</div>
	
	<div id="ai-panel">
	  <div class="ai-card-inner">
		<div class="ai-card-header">
		  <span class="ai-dot"></span>
		  <span class="ai-title">Guida AI</span>
		  <span class="ai-status" id="ai-status"></span>
		</div>
		<div class="ai-card-body" id="ai-narration">—</div>
	  </div>
	</div>

    <div id="planet-label">
        <div class="panel-title">Pianeti</div>
        <div class="legend-item"><span class="legend-dot" style="background:#b0b0b0"></span> Mercurio</div>
        <div class="legend-item"><span class="legend-dot" style="background:#e8c56d"></span> Venere</div>
        <div class="legend-item"><span class="legend-dot" style="background:#4488ff"></span> Terra</div>
        <div class="legend-item"><span class="legend-dot" style="background:#cc4422"></span> Marte</div>
        <div class="legend-item"><span class="legend-dot" style="background:#c88a50"></span> Giove</div>
        <div class="legend-item"><span class="legend-dot" style="background:#d4a84b"></span> Saturno</div>
        <div class="legend-item"><span class="legend-dot" style="background:#88ccdd"></span> Urano</div>
        <div class="legend-item"><span class="legend-dot" style="background:#4466dd"></span> Nettuno</div>
		<div class="panel-title" style="margin-top:10px; font-size:13px; color:#ff8833;">Pianeti Nani</div>
		<div class="legend-item"><span class="legend-dot" style="background:#aaaaaa"></span> Cerere</div>
		<div class="legend-item"><span class="legend-dot" style="background:#c8a882"></span> Plutone</div>
		<div class="legend-item"><span class="legend-dot" style="background:#dddddd"></span> Eris</div>
		<div class="legend-item"><span class="legend-dot" style="background:#ddbbbb"></span> Haumea</div>
		<div class="legend-item"><span class="legend-dot" style="background:#cc9966"></span> Makemake</div>
    </div>
	<!-- === GIOCO: pulsante toggle in basso a destra === -->
	<div id="game-toggle" title="Modalità Gioco / Simulazione">🚀</div>

	<!-- === GIOCO: pannello === -->
	<div id="game-panel">
	  <div class="game-card-inner">
		<div class="game-card-header">
		  <span class="game-dot"></span>
		  <span class="game-title" id="game-title">Fuga dalla Terra</span>
		  <span class="game-status" id="game-status"></span>
		</div>
		<div class="game-card-body" id="game-body">—</div>
		<div class="game-components" id="game-components"></div>
		<button id="game-start-btn" class="game-start-btn" style="display:none;">🚀 OK, partiamo</button>
		<div class="game-input-row" id="game-input-row" style="display:none;">
		  <input type="text" id="game-answer" placeholder="La tua risposta..." autocomplete="off">
		  <button id="game-submit">Invia</button>
		</div>
	  </div>
	</div>



    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
        }
    }
    </script>

    <script type="module" src="app.js"></script>
</body>
</html>
