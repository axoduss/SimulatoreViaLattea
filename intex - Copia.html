<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulatore Sistema Solare 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }
        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 30, 0.85);
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 12px;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        #controls button {
            background: rgba(60, 120, 255, 0.2);
            border: 1px solid rgba(100, 150, 255, 0.5);
            color: #fff;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        #controls button:hover {
            background: rgba(60, 120, 255, 0.4);
        }
        #controls button.active {
            background: rgba(60, 120, 255, 0.6);
            border-color: #88aaff;
        }
        #controls label {
            font-size: 13px;
            color: #aac;
        }
        #controls input[type="range"] {
            width: 120px;
            accent-color: #4488ff;
        }
        #speed-value {
            font-size: 13px;
            color: #8af;
            min-width: 45px;
        }
        #info-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(10, 10, 30, 0.85);
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 12px;
            padding: 15px 20px;
            backdrop-filter: blur(10px);
            z-index: 100;
            font-size: 13px;
            line-height: 1.8;
        }
        #info-panel .title {
            font-size: 15px;
            font-weight: bold;
            color: #8af;
            margin-bottom: 8px;
        }
        #info-panel .scale {
            color: #aac;
        }
        #planet-label {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 30, 0.85);
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 12px;
            padding: 15px 20px;
            backdrop-filter: blur(10px);
            z-index: 100;
            font-size: 12px;
            line-height: 1.8;
            max-width: 220px;
        }
        #planet-label .panel-title {
            font-size: 14px;
            font-weight: bold;
            color: #8af;
            margin-bottom: 5px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
		
		/* Search Bar - Sci-Fi Style */
		#search-container {
			position: fixed;
			top: 20px;
			left: 50%;
			transform: translateX(-50%);
			z-index: 200;
			display: flex;
			align-items: center;
			gap: 0;
		}

		#search-input {
			width: 280px;
			padding: 10px 18px;
			background: rgba(5, 10, 30, 0.9);
			border: 1px solid rgba(0, 180, 255, 0.4);
			border-right: none;
			border-radius: 8px 0 0 8px;
			color: #00e5ff;
			font-family: 'Courier New', monospace;
			font-size: 14px;
			letter-spacing: 1px;
			outline: none;
			backdrop-filter: blur(12px);
			transition: all 0.3s;
			box-shadow: 0 0 15px rgba(0, 150, 255, 0.1) inset, 0 0 8px rgba(0, 150, 255, 0.05);
		}

		#search-input::placeholder {
			color: rgba(0, 180, 255, 0.4);
			font-style: italic;
		}

		#search-input:focus {
			border-color: rgba(0, 220, 255, 0.8);
			box-shadow: 0 0 20px rgba(0, 180, 255, 0.3) inset, 0 0 15px rgba(0, 180, 255, 0.15);
			background: rgba(5, 10, 40, 0.95);
		}

		#search-btn {
			padding: 10px 16px;
			background: rgba(0, 120, 255, 0.3);
			border: 1px solid rgba(0, 180, 255, 0.4);
			border-radius: 0 8px 8px 0;
			color: #00e5ff;
			font-size: 16px;
			cursor: pointer;
			backdrop-filter: blur(12px);
			transition: all 0.3s;
		}

		#search-btn:hover {
			background: rgba(0, 150, 255, 0.5);
			box-shadow: 0 0 20px rgba(0, 180, 255, 0.3);
		}

		#search-suggestions {
			position: absolute;
			top: 100%;
			left: 0;
			width: 280px;
			margin-top: 4px;
			background: rgba(5, 10, 30, 0.95);
			border: 1px solid rgba(0, 180, 255, 0.3);
			border-radius: 8px;
			overflow: hidden;
			display: none;
			backdrop-filter: blur(12px);
			box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
		}

		#search-suggestions.visible {
			display: block;
		}

		.suggestion-item {
			padding: 9px 18px;
			color: #88ddff;
			font-family: 'Courier New', monospace;
			font-size: 13px;
			cursor: pointer;
			transition: all 0.15s;
			border-bottom: 1px solid rgba(0, 100, 200, 0.1);
			display: flex;
			align-items: center;
			gap: 10px;
		}

		.suggestion-item:last-child {
			border-bottom: none;
		}

		.suggestion-item:hover {
			background: rgba(0, 120, 255, 0.2);
			color: #00ffff;
			padding-left: 22px;
		}

		.suggestion-item .sg-icon {
			font-size: 14px;
		}

		#search-status {
			position: absolute;
			top: 100%;
			right: 0;
			margin-top: 4px;
			padding: 6px 12px;
			background: rgba(5, 10, 30, 0.9);
			border: 1px solid rgba(255, 80, 80, 0.5);
			border-radius: 6px;
			color: #ff6666;
			font-family: 'Courier New', monospace;
			font-size: 11px;
			display: none;
			backdrop-filter: blur(10px);
		}

		#search-status.visible {
			display: block;
		}

		#tracking-indicator {
			position: fixed;
			top: 70px;
			left: 50%;
			transform: translateX(-50%);
			padding: 6px 16px;
			background: rgba(0, 40, 80, 0.85);
			border: 1px solid rgba(0, 200, 255, 0.4);
			border-radius: 20px;
			color: #00e5ff;
			font-family: 'Courier New', monospace;
			font-size: 12px;
			letter-spacing: 1px;
			display: none;
			z-index: 200;
			backdrop-filter: blur(10px);
			box-shadow: 0 0 15px rgba(0, 150, 255, 0.15);
			animation: pulse-border 2s infinite;
		}

		#tracking-indicator.visible {
			display: flex;
			align-items: center;
			gap: 10px;
		}

		#tracking-indicator .stop-btn {
			background: rgba(255, 60, 60, 0.3);
			border: 1px solid rgba(255, 100, 100, 0.5);
			color: #ff8888;
			padding: 2px 8px;
			border-radius: 4px;
			cursor: pointer;
			font-size: 11px;
			font-family: 'Courier New', monospace;
			transition: all 0.2s;
		}

		#tracking-indicator .stop-btn:hover {
			background: rgba(255, 60, 60, 0.5);
			color: #ffaaaa;
		}

		@keyframes pulse-border {
			0%, 100% { border-color: rgba(0, 200, 255, 0.4); }
			50% { border-color: rgba(0, 200, 255, 0.8); }
		}
		
		/* Target HUD Overlay - Sci-Fi */
		#target-hud {
			position: fixed;
			pointer-events: none;
			z-index: 150;
			display: none;
		}

		#target-hud.visible {
			display: block;
		}

		#target-hud .hud-bracket {
			position: absolute;
			width: 80px;
			height: 80px;
		}

		#target-hud .hud-bracket.tl {
			top: 0; left: 0;
			border-top: 2px solid rgba(0, 230, 255, 0.8);
			border-left: 2px solid rgba(0, 230, 255, 0.8);
			box-shadow: -2px -2px 8px rgba(0, 200, 255, 0.3), inset 2px 2px 8px rgba(0, 200, 255, 0.05);
		}

		#target-hud .hud-bracket.tr {
			top: 0; right: 0;
			border-top: 2px solid rgba(0, 230, 255, 0.8);
			border-right: 2px solid rgba(0, 230, 255, 0.8);
			box-shadow: 2px -2px 8px rgba(0, 200, 255, 0.3), inset -2px 2px 8px rgba(0, 200, 255, 0.05);
		}

		#target-hud .hud-bracket.bl {
			bottom: 0; left: 0;
			border-bottom: 2px solid rgba(0, 230, 255, 0.8);
			border-left: 2px solid rgba(0, 230, 255, 0.8);
			box-shadow: -2px 2px 8px rgba(0, 200, 255, 0.3), inset 2px -2px 8px rgba(0, 200, 255, 0.05);
		}

		#target-hud .hud-bracket.br {
			bottom: 0; right: 0;
			border-bottom: 2px solid rgba(0, 230, 255, 0.8);
			border-right: 2px solid rgba(0, 230, 255, 0.8);
			box-shadow: 2px 2px 8px rgba(0, 200, 255, 0.3), inset -2px -2px 8px rgba(0, 200, 255, 0.05);
		}

		#target-hud .hud-label {
			position: absolute;
			bottom: -32px;
			left: 50%;
			transform: translateX(-50%);
			background: rgba(0, 20, 50, 0.85);
			border: 1px solid rgba(0, 200, 255, 0.5);
			border-radius: 4px;
			padding: 3px 12px;
			color: #00e5ff;
			font-family: 'Courier New', monospace;
			font-size: 11px;
			letter-spacing: 2px;
			text-transform: uppercase;
			white-space: nowrap;
			box-shadow: 0 0 12px rgba(0, 180, 255, 0.2);
			animation: hud-label-pulse 2.5s infinite;
		}

		#target-hud .hud-label::before {
			content: '◆';
			margin-right: 6px;
			font-size: 8px;
			color: rgba(0, 255, 200, 0.8);
		}

		#target-hud .hud-distance {
			position: absolute;
			top: -24px;
			left: 50%;
			transform: translateX(-50%);
			color: rgba(0, 200, 255, 0.6);
			font-family: 'Courier New', monospace;
			font-size: 9px;
			letter-spacing: 1px;
			white-space: nowrap;
		}

		#target-hud .hud-crosshair {
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			width: 6px;
			height: 6px;
			border: 1px solid rgba(0, 255, 200, 0.6);
			border-radius: 50%;
			box-shadow: 0 0 6px rgba(0, 255, 200, 0.4);
		}

		@keyframes hud-label-pulse {
			0%, 100% { opacity: 1; }
			50% { opacity: 0.75; }
		}

		#target-hud .hud-scanline {
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
			overflow: hidden;
			pointer-events: none;
		}

		#target-hud .hud-scanline::after {
			content: '';
			position: absolute;
			top: -100%;
			left: 0;
			right: 0;
			height: 100%;
			background: linear-gradient(180deg, transparent 0%, rgba(0, 200, 255, 0.03) 50%, transparent 100%);
			animation: scanline-move 3s linear infinite;
		}

		@keyframes scanline-move {
			0% { top: -100%; }
			100% { top: 100%; }
		}
		
		
		
		
		
    </style>
</head>
<body>
    <div id="canvas-container"></div>
	<div id="search-container">
		<input type="text" id="search-input" placeholder="⟩ CERCA OGGETTO..." autocomplete="off">
		<button id="search-btn">⌖</button>
		<div id="search-suggestions"></div>
		<div id="search-status"></div>
	</div>

	<div id="tracking-indicator">
		<span id="tracking-name">TRACKING: --</span>
		<button class="stop-btn" id="stop-tracking">✕ STOP</button>
	</div>
	
	<div id="target-hud">
		<div class="hud-scanline"></div>
		<div class="hud-bracket tl"></div>
		<div class="hud-bracket tr"></div>
		<div class="hud-bracket bl"></div>
		<div class="hud-bracket br"></div>
		<div class="hud-crosshair"></div>
		<div class="hud-distance" id="hud-distance"></div>
		<div class="hud-label" id="hud-label"></div>
	</div>

    <div id="controls">
        <button id="btn-play" class="active">▶ Play</button>
        <button id="btn-pause">⏸ Pausa</button>
        <label>Velocità:</label>
        <input type="range" id="speed-slider" min="0.1" max="50" step="0.1" value="1">
        <span id="speed-value">1.0x</span>
    </div>

    <div id="info-panel">
        <div class="title">🌌 Sistema Solare</div>
        <div class="scale" id="scale-info">Scala: ~1 unità ≈ 0.15 UA</div>
        <div class="scale" id="zoom-info">Distanza camera: --</div>
        <div class="scale" id="time-info">Tempo simulato: 0 giorni</div>
    </div>

    <div id="planet-label">
        <div class="panel-title">Pianeti</div>
        <div class="legend-item"><span class="legend-dot" style="background:#b0b0b0"></span> Mercurio</div>
        <div class="legend-item"><span class="legend-dot" style="background:#e8c56d"></span> Venere</div>
        <div class="legend-item"><span class="legend-dot" style="background:#4488ff"></span> Terra</div>
        <div class="legend-item"><span class="legend-dot" style="background:#cc4422"></span> Marte</div>
        <div class="legend-item"><span class="legend-dot" style="background:#c88a50"></span> Giove</div>
        <div class="legend-item"><span class="legend-dot" style="background:#d4a84b"></span> Saturno</div>
        <div class="legend-item"><span class="legend-dot" style="background:#88ccdd"></span> Urano</div>
        <div class="legend-item"><span class="legend-dot" style="background:#4466dd"></span> Nettuno</div>
		<div class="panel-title" style="margin-top:10px; font-size:13px; color:#ff8833;">Pianeti Nani</div>
		<div class="legend-item"><span class="legend-dot" style="background:#aaaaaa"></span> Cerere</div>
		<div class="legend-item"><span class="legend-dot" style="background:#c8a882"></span> Plutone</div>
		<div class="legend-item"><span class="legend-dot" style="background:#dddddd"></span> Eris</div>
		<div class="legend-item"><span class="legend-dot" style="background:#ddbbbb"></span> Haumea</div>
		<div class="legend-item"><span class="legend-dot" style="background:#cc9966"></span> Makemake</div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // === SCENE SETUP ===
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 5000);
        camera.position.set(0, 45, 45);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // === POST-PROCESSING (BLOOM) ===
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.5, 0.4, 0.85
        );
        bloomPass.threshold = 0.2;
        bloomPass.strength = 1.8;
        bloomPass.radius = 0.6;
        composer.addPass(bloomPass);

        // === ORBIT CONTROLS ===
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 3;
        controls.maxDistance = 800;
        controls.enablePan = true;

        // === STARS ===
        function createStars() {
            const geometry = new THREE.BufferGeometry();
            const count = 12000;
            const positions = new Float32Array(count * 3);
            const sizes = new Float32Array(count);

            for (let i = 0; i < count; i++) {
                const r = 600 + Math.random() * 800;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                positions[i * 3 + 2] = r * Math.cos(phi);
                sizes[i] = 0.5 + Math.random() * 1.5;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

            const material = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.7,
                sizeAttenuation: true,
                transparent: true,
                opacity: 0.85
            });

            scene.add(new THREE.Points(geometry, material));
        }
        createStars();

        // === ECLIPTIC GRID ===
        function createEclipticGrid() {
            const grid = new THREE.GridHelper(100, 50, 0x223366, 0x112244);
            grid.material.opacity = 0.12;
            grid.material.transparent = true;
            scene.add(grid);
        }
        createEclipticGrid();
		const AU_SCALE = 6.5; // 1 AU = 6.5 scene units
		
		// === ASTEROID BELTS ===
        function createIrregularAsteroidGeometry(baseRadius) {
            const geo = new THREE.DodecahedronGeometry(baseRadius, 0); // detail 0 = meno facce, più roccioso
            const positions = geo.attributes.position;
            for (let i = 0; i < positions.count; i++) {
                const x = positions.getX(i);
                const y = positions.getY(i);
                const z = positions.getZ(i);
                const noise = 0.85 + Math.random() * 0.3; // deformazione leggera: da 0.85 a 1.15
                positions.setXYZ(i, x * noise, y * noise, z * noise);
            }
            geo.computeVertexNormals();
            return geo;
        }

        function createAsteroidBelt(innerAU, outerAU, count, minSize, maxSize, ySpread) {
            const innerRadius = innerAU * AU_SCALE;
            const outerRadius = outerAU * AU_SCALE;
            const asteroidGroup = new THREE.Group();

            // Usa InstancedMesh per performance con geometria irregolare base
            // Ma per avere forme diverse, creiamo diversi template e li riusiamo
            const templateCount = 8;
            const templates = [];
            for (let t = 0; t < templateCount; t++) {
                const size = minSize + Math.random() * (maxSize - minSize);
                templates.push(createIrregularAsteroidGeometry(size));
            }

            const asteroidMaterial = new THREE.MeshStandardMaterial({
                ccolor: 0xccbbaa,
                roughness: 0.8,
                metalness: 0.05,
                emissive: 0x222211,
                emissiveIntensity: 0.15
            });

            // Segnaposto: la texture verrà assegnata dopo il caricamento
            asteroidGroup.userData.material = asteroidMaterial;
            asteroidGroup.userData.needsTexture = true;

            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = innerRadius + Math.random() * (outerRadius - innerRadius);
                const templateIdx = Math.floor(Math.random() * templateCount);

                const mesh = new THREE.Mesh(templates[templateIdx], asteroidMaterial);

                mesh.position.x = Math.cos(angle) * dist;
                mesh.position.z = Math.sin(angle) * dist;
                mesh.position.y = (Math.random() - 0.5) * ySpread;

                // Rotazione casuale per varietà visiva
                mesh.rotation.x = Math.random() * Math.PI * 2;
                mesh.rotation.y = Math.random() * Math.PI * 2;
                mesh.rotation.z = Math.random() * Math.PI * 2;

                asteroidGroup.add(mesh);
            }

            scene.add(asteroidGroup);
            return asteroidGroup;
        }

        // Fascia principale: 2.2 - 3.2 UA, tra Marte e Giove
        const mainBelt = createAsteroidBelt(2.2, 3.2, 1200, 0.05, 0.15, 0.8);

        // Fascia di Kuiper: 30 - 50 UA, oltre Nettuno
        const kuiperBelt = createAsteroidBelt(30, 50, 5000, 0.3, 0.8, 3.0);
		
		
		
		// === TEXTURE LOADER ===
		const textureLoader = new THREE.TextureLoader();

		// Preload textures (2k default, 8k for close-up)
		const textures = {
			sun: {
				low: textureLoader.load('Texture/Sun_Moon_Stars/2k_sun.jpg'),
				high: textureLoader.load('Texture/Sun_Moon_Stars/8k_sun.jpg')
			},
			mercury: {
				low: textureLoader.load('Texture/Planets/2k_mercury.jpg'),
				high: textureLoader.load('Texture/Planets/8k_mercury.jpg')
			},
			venus: {
				low: textureLoader.load('Texture/Planets/2k_venus_surface.jpg'),
				high: textureLoader.load('Texture/Planets/8k_venus_surface.jpg')
			},
			earth: {
				low: textureLoader.load('Texture/Planets/2k_earth_daymap.jpg'),
				high: textureLoader.load('Texture/Planets/8k_earth_daymap.jpg')
			},
			mars: {
				low: textureLoader.load('Texture/Planets/2k_mars.jpg'),
				high: textureLoader.load('Texture/Planets/8k_mars.jpg')
			},
			jupiter: {
				low: textureLoader.load('Texture/Planets/2k_jupiter.jpg'),
				high: textureLoader.load('Texture/Planets/8k_jupiter.jpg')
			},
			saturn: {
				low: textureLoader.load('Texture/Planets/2k_saturn.jpg'),
				high: textureLoader.load('Texture/Planets/8k_saturn.jpg')
			},
			saturnRing: {
				low: textureLoader.load('Texture/Planets/2k_saturn_ring_alpha.png'),

			return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

		// Update camera tracking (called in animate loop)
		function updateCameraTracking() {
			if (!trackingTarget) return;

			const targetPos = trackingTarget.getPosition();

			if (isAnimatingCamera) {
				const elapsed = performance.now() - cameraAnimStart;
				const progress = Math.min(elapsed / cameraAnimDuration, 1);
				const eased = easeInOutCubic(progress);

				const destination = targetPos.clone().add(cameraEndOffset);
				camera.position.lerpVectors(cameraStartPos, destination, eased);
				controls.target.lerp(targetPos, eased * 1.2 > 1 ? 1 : eased * 1.2);

				if (progress >= 1) {

				}
			} else if (!userInterrupted) {

				camera.position.lerp(destination, 0.03);
				controls.target.lerp(targetPos, 0.05);

			const projected = targetPos.clone().project(camera);

			if (projected.z > 1) {

			}

			const screenX = (projected.x * 0.5 + 0.5) * window.innerWidth;
			const screenY = (-projected.y * 0.5 + 0.5) * window.innerHeight;

			// Calculate apparent size based on distance and object radius
			const dist = camera.position.distanceTo(targetPos);
			let objectRadius = 1.5; // default (sun)

			const angularSize = objectRadius / dist;
			const boxSize = Math.max(60, Math.min(200, angularSize * window.innerHeight * 3));

			// Position HUD
			targetHud.style.left = (screenX - boxSize / 2) + 'px';
			targetHud.style.top = (screenY - boxSize / 2) + 'px';
			targetHud.style.width = boxSize + 'px';

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            if (isPlaying) {
                // 1 real second = 1 simulated day * speedMultiplier
                const dayStep = delta * speedMultiplier;
                simulatedDays += dayStep;

                // Update planet positions
                planets.forEach(planet => {
                    const angle = planet.phase + (simulatedDays / planet.period) * Math.PI * 2;

                    // Kepler ellipse position (approximate with mean anomaly)
                    const x = planet.a * Math.cos(angle) - planet.c;
                    const z = planet.b * Math.sin(angle);

                    // Apply inclination
                    const cosI = Math.cos(planet.inclination);
                    const sinI = Math.sin(planet.inclination);

                    planet.mesh.position.x = x;
                    planet.mesh.position.y = -z * Math.sin(planet.inclination);
					planet.mesh.position.z = z * Math.cos(planet.inclination);
                });
				
				// Update dwarf planet positions
				dwarfPlanets.forEach(planet => {
					const angle = planet.phase + (simulatedDays / planet.period) * Math.PI * 2;

					const x = planet.a * Math.cos(angle) - planet.c;
					const z = planet.b * Math.sin(angle);

					planet.mesh.position.x = x;
					planet.mesh.position.y = -z * Math.sin(planet.inclination);
					planet.mesh.position.z = z * Math.cos(planet.inclination);
				});
            }

            // Sun subtle rotation
            sun.rotation.y += delta * 0.1;
			
			// Rotazione lenta delle fasce di asteroidi
            if (isPlaying) {
                mainBelt.rotation.y += delta * 0.002 * speedMultiplier;
                kuiperBelt.rotation.y += delta * 0.0005 * speedMultiplier;
            }

            // Update info panel
            const dist = camera.position.length();
            const distUA = (dist / AU_SCALE).toFixed(2);
            scaleInfo.textContent = `Scala: 1 UA = ${AU_SCALE.toFixed(1)} unità`;
            zoomInfo.textContent = `Distanza camera: ${distUA} UA`;

            if (simulatedDays < 365) {
                timeInfo.textContent = `Tempo simulato: ${Math.floor(simulatedDays)} giorni`;
            } else {
                const years = (simulatedDays / 365.25).toFixed(2);
                timeInfo.textContent = `Tempo simulato: ${years} anni`;
            }

            controls.update();
			
			// Camera tracking update
            updateCameraTracking();
			updateTargetHUD();
			
			
			// === LOD TEXTURE SWITCHING ===
			// Sun LOD
			const sunDist = camera.position.distanceTo(sun.position);
			if (sunDist < LOD_THRESHOLD && sun.userData.currentLOD === 'low') {
				sun.material.map = textures.sun.high;
				sun.material.needsUpdate = true;
				sun.userData.currentLOD = 'high';
			} else if (sunDist >= LOD_THRESHOLD && sun.userData.currentLOD === 'high') {
				sun.material.map = textures.sun.low;
				sun.material.needsUpdate = true;
				sun.userData.currentLOD = 'low';
			}

			// Planets LOD
			planets.forEach(planet => {
				const planetDist = camera.position.distanceTo(planet.mesh.position);
				const texData = textures[planet.texKey];
				if (!texData) return;

				if (planetDist < LOD_THRESHOLD && planet.mesh.userData.currentLOD === 'low' && texData.high) {
					planet.mesh.material.map = texData.high;
					planet.mesh.material.needsUpdate = true;
					planet.mesh.userData.currentLOD = 'high';
				} else if (planetDist >= LOD_THRESHOLD && planet.mesh.userData.currentLOD === 'high') {
					planet.mesh.material.map = texData.low;
					planet.mesh.material.needsUpdate = true;
					planet.mesh.userData.currentLOD = 'low';
				}

				// Saturn ring LOD
				if (planet.name === 'Saturno') {
					const ring = planet.mesh.children[0];
					if (ring && ring.userData) {
						if (planetDist < LOD_THRESHOLD && ring.userData.currentLOD === 'low') {
							ring.material.map = textures.saturnRing.high;
							ring.material.needsUpdate = true;
							ring.userData.currentLOD = 'high';
						} else if (planetDist >= LOD_THRESHOLD && ring.userData.currentLOD === 'high') {
							ring.material.map = textures.saturnRing.low;
							ring.material.needsUpdate = true;
							ring.userData.currentLOD = 'low';
						}
					}
				}
			});
			
			// Dwarf Planets LOD
			dwarfPlanets.forEach(planet => {
				const planetDist = camera.position.distanceTo(planet.mesh.position);
				const texData = textures[planet.texKey];
				if (!texData) return;

				if (planetDist < LOD_THRESHOLD && planet.mesh.userData.currentLOD === 'low' && texData.high) {
					planet.mesh.material.map = texData.high;
					planet.mesh.material.needsUpdate = true;
					planet.mesh.userData.currentLOD = 'high';
				} else if (planetDist >= LOD_THRESHOLD && planet.mesh.userData.currentLOD === 'high') {
					planet.mesh.material.map = texData.low;
					planet.mesh.material.needsUpdate = true;
					planet.mesh.userData.currentLOD = 'low';
				}
			});
			
			
			
			
			
            composer.render();
        }

        animate();
    </script>
</body>
</html>
